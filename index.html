<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>데스크탑 디지털 시계</title>
  <link rel="stylesheet" href="style.css?v=1.1.0">
</head>
<body>
  <!-- LED Matrix Grid Panel Overlay -->
  <div class="led-matrix-overlay"></div>

  <div id="app-container">
    <!-- Main Display Section -->
    <main class="clock-display">
      <!-- Time Display Area (Layout Shift Free structure) -->
      <div class="time-display-container">
        <div class="time-main">
          <span id="clock-hour">00</span><span class="colon" id="clock-colon">:</span><span id="clock-min">00</span>
        </div>
        <div class="time-sub" id="clock-sub-pane">
          <div class="ampm-text" id="clock-ampm">AM</div>
          <div class="seconds-text" id="clock-seconds">00</div>
        </div>
      </div>

      <!-- Info Row (Date & Weather) -->
      <div class="info-row">
        <!-- Date display -->
        <div class="date-section">
          <div id="date-text">2026년 06월 13일 (토)</div>
        </div>

        <!-- Weather display -->
        <div class="weather-section" id="weather-block" style="opacity: 0;">
          <div id="weather-icon-wrapper">
            <!-- Dynamic SVG injected by JS -->
          </div>
          <div class="weather-info">
            <span id="weather-temp">--°C</span>
            <span id="weather-desc">날씨 조회 중...</span>
          </div>
        </div>
      </div>
    </main>

    <!-- Floating UI Controls (Auto hides) -->
    <div id="control-bar" class="active">
      <button id="fullscreen-btn" class="icon-btn" title="전체화면 토글">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
      </button>
      <button id="settings-btn" class="icon-btn" title="설정">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>

    <!-- Settings Drawer -->
    <aside id="settings-panel">
      <div class="settings-header">
        <h2>시계 설정</h2>
        <button id="settings-close" class="close-btn">&times;</button>
      </div>

      <div class="settings-body">
        <!-- Color Theme Select -->
        <div class="setting-item">
          <label>LED 테마 색상</label>
          <div class="color-options">
            <button class="color-swatch active" data-color="green" style="background-color: #34c759;" title="에메랄드 그린"></button>
            <button class="color-swatch" data-color="amber" style="background-color: #ff9500;" title="앰버 오렌지"></button>
            <button class="color-swatch" data-color="red" style="background-color: #ff3b30;" title="루비 레드"></button>
            <button class="color-swatch" data-color="blue" style="background-color: #007aff;" title="아이스 블루"></button>
            <button class="color-swatch" data-color="white" style="background-color: #ffffff;" title="퓨어 화이트"></button>
          </div>
        </div>

        <!-- Clock Font Select -->
        <div class="setting-item">
          <label for="font-select">시계 폰트 스타일</label>
          <select id="font-select">
            <option value="chivo">Chivo Mono (기본)</option>
            <option value="teko">Teko (세로형)</option>
            <option value="dseg">DSEG7 (디지털 세그먼트)</option>
          </select>
        </div>

        <!-- Day/Night Auto Theme -->
        <div class="setting-item">
          <div class="toggle-row">
            <span>주/야간 자동 색상 모드</span>
            <label class="switch">
              <input type="checkbox" id="toggle-auto-theme">
              <span class="slider"></span>
            </label>
          </div>
          <div id="auto-theme-panel" style="display: none; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 8px; padding: 12px; margin-top: 8px; flex-direction: column; gap: 10px; box-sizing: border-box;">
            <div class="setting-item" style="gap: 4px;">
              <label style="font-size: 0.75rem;">주간 시간대 범위</label>
              <div style="display: flex; align-items: center; gap: 8px;">
                <span>시작</span>
                <select id="auto-theme-start" style="flex: 1; padding: 4px 6px;">
                  <!-- populated by JS -->
                </select>
                <span>~ 종료</span>
                <select id="auto-theme-end" style="flex: 1; padding: 4px 6px;">
                  <!-- populated by JS -->
                </select>
              </div>
            </div>
            <div class="setting-item" style="gap: 4px;">
              <label style="font-size: 0.75rem;">주간 테마 색상</label>
              <select id="auto-theme-day-color" style="padding: 4px 6px;">
                <option value="green">에메랄드 그린</option>
                <option value="amber">앰버 오렌지</option>
                <option value="red">루비 - 레드</option>
                <option value="blue">아이스 블루</option>
                <option value="white">퓨어 화이트</option>
              </select>
            </div>
            <div class="setting-item" style="gap: 4px;">
              <label style="font-size: 0.75rem;">야간 테마 색상</label>
              <select id="auto-theme-night-color" style="padding: 4px 6px;">
                <option value="green">에메랄드 그린</option>
                <option value="amber">앰버 오렌지</option>
                <option value="red">루비 - 레드</option>
                <option value="blue">아이스 블루</option>
                <option value="white">퓨어 화이트</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Clock Size (Scale) Slider -->
        <div class="setting-item">
          <div class="toggle-row">
            <span>시계 크기 조절</span>
            <span id="scale-value">100%</span>
          </div>
          <div class="slider-container" style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
            <span style="font-size: 0.8rem; color: var(--text-secondary);">60%</span>
            <input type="range" id="scale-slider" min="60" max="200" value="100" step="5" style="flex: 1; accent-color: var(--led-active); cursor: pointer;">
            <span style="font-size: 0.8rem; color: var(--text-secondary);">200%</span>
          </div>
        </div>

        <!-- Seconds Display Switch -->
        <div class="setting-item">
          <div class="toggle-row">
            <span>초(Seconds) 단위 표시</span>
            <label class="switch">
              <input type="checkbox" id="toggle-seconds" checked>
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <!-- 12H / 24H Toggle -->
        <div class="setting-item">
          <div class="toggle-row">
            <span>24시간제 형식 사용</span>
            <label class="switch">
              <input type="checkbox" id="toggle-24h">
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <!-- Weather Location Setup -->
        <div class="setting-item">
          <label for="location-select">날씨 기준 지역</label>
          <select id="location-select">
            <option value="auto">현재 위치 (자동 IP인식)</option>
            <option value="seoul">서울</option>
            <option value="busan">부산</option>
            <option value="daegu">대구</option>
            <option value="incheon">인천</option>
            <option value="gwangju">광주</option>
            <option value="daejeon">대전</option>
            <option value="ulsan">울산</option>
            <option value="jeju">제주</option>
            <option value="dongtan">화성 동탄</option>
            <option value="yeongtong">수원 영통</option>
          </select>
          <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 5px;">
            현재 조회 지역: <span id="current-weather-location" style="color: var(--led-active); font-weight: bold;">--</span>
          </div>
        </div>

        <!-- Weather Icon Style Setup -->
        <div class="setting-item">
          <label for="weather-icon-style-select">날씨 아이콘 스타일</label>
          <select id="weather-icon-style-select">
            <option value="animated">애니메이션 컬러 아이콘 (animated)</option>
            <option value="static">정적 컬러 아이콘 (static)</option>
            <option value="monochrome">기존 LED 테마 아웃라인 (단색)</option>
          </select>
        </div>

        <!-- Fine Dust Toggle -->
        <div class="setting-item">
          <div class="toggle-row">
            <div>
              <span>미세먼지 상세 수치 표시</span>
              <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px;">비활성화 시 심플 배지 형태로 표시됩니다.</div>
            </div>
            <label class="switch">
              <input type="checkbox" id="toggle-dust-detail">
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <!-- OLED Burn-in Toggle -->
        <div class="setting-item">
          <div class="toggle-row">
            <div>
              <span>OLED 번인 방지 모드</span>
              <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px;">1분 주기로 1~4px 미세 랜덤 시프트 작동</div>
            </div>
            <label class="switch">
              <input type="checkbox" id="toggle-burnin">
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <!-- Screen Wake Lock API Info -->
        <div class="setting-item">
          <label>태블릿 시스템 화면 모드</label>
          <div class="status-badge">
            <div class="status-dot"></div>
            <span id="wakelock-status">화면 항상 켜짐 활성화 중 (Wake Lock)</span>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <script src="app.js?v=1.1.0"></script>
</body>
</html>
